name: CI

on:
  push:
    branches: [ main, v* ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-file: environment-ci.yml
          environment-name: biomonai_ci
          cache-environment: true
          cache-downloads: true
          create-args: >-
            python=3.11

      - name: Install package
        run: |
          pip install -e ".[dev]"

      - name: Run nbdev tests
        env:
          CI: true
        run: |
          nbdev-test --skip_folder_re ^[Tutorials|_.] --do_print
