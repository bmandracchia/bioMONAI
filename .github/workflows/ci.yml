name: CI

on:
  push:
    branches: [ main, v* ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Miniconda and create environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: 3.11.5
          environment-file: environment.yaml
          activate-environment: biomonai_latest

      - name: Verify environment
        run: |
          conda info --envs
          python -V
          python -c "import nbdev; print('nbdev', getattr(nbdev,'__version__', 'n/a'))"

      - name: Install package and run nbdev tests
        env:
          CI: true
        run: |
          pip install -e ".[dev]"
          nbdev-test
